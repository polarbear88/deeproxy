# deeproxy 示例配置
#
# 注意：上游 SOCKS5 代理不在此处配置，而是由客户端在 SOCKS5 用户名字段中
# 以 base64("user:pwd@host:port") 的形式动态携带。本文件只配置本地监听与分流规则。

# 本地 SOCKS5 服务监听地址（默认 127.0.0.1:1080，仅本机可连）
listen: "127.0.0.1:1768"

# 规则都不命中时的默认动作：forward | direct | reject（默认 forward）
default_action: forward

# 日志级别：debug | info | warn | error（默认 info）
log_level: info

# 连接双向空闲超时（秒），用于回收半开连接（默认 300）
idle_timeout_sec: 300

# 分流规则（按书写顺序首匹配）
#   match 前缀：domain（精确域名）/ domain-suffix（域名后缀）/ ip-cidr（IP 网段）
#   action：forward（走上游）/ direct（本机直连）/ reject（拒绝）
rules:
  - { match: "domain-suffix:google.com", action: forward }
  - { match: "domain:example.com",       action: direct  }
  - { match: "ip-cidr:192.168.0.0/16",   action: direct  }
  - { match: "domain-suffix:ads.com",    action: reject  }
